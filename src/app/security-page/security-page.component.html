<div class="page" @pageIn>
    <!-- <app-title-bar /> -->
    <div class="content-wrapper">
        <div class="feedback-window">
            <p id="feedback-text">Enter your code</p>
        </div>
        <div class="keypad-container">
            <div class="keypad">
                <button class="keypad-button">1</button>
                <button class="keypad-button">2</button>
                <button class="keypad-button">3</button>
                <button class="keypad-button">4</button>
                <button class="keypad-button">5</button>
                <button class="keypad-button">6</button>
                <button class="keypad-button">7</button>
                <button class="keypad-button">8</button>
                <button class="keypad-button">9</button>
                <button class="keypad-button">0</button>
                <button class="keypad-button enter-button">Enter</button>
            </div>
            <div class="side-buttons">
                <button class="side-button">Button 1</button>
                <button class="side-button">Button 2</button>
                <button class="side-button">Button 3</button>
                <button class="side-button">Button 4</button>
                <button class="side-button">Button 5</button>
            </div>
        </div>
            
    </div>
</div>
